version: 2

models:
  - name: fct_champion_stats
    description: "Estatísticas agregadas de campeões por patch no Challenger BR"
    columns:
      - name: champion_name
        description: "Nome do campeão"
        data_tests:
          - not_null

      - name: win_rate
        description: "Percentual de vitórias"
        data_tests:
          - not_null

      - name: games_played
        description: "Total de partidas"
        data_tests:
          - not_null

      - name: patch
        description: "Versão do patch"
        data_tests:
          - not_null