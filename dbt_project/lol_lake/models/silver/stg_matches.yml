version: 2

models:
  - name: stg_matches
    description: "Partidas limpas e enriquecidas"
    columns:
      - name: match_id
        description: "ID único da partida"
        data_tests:
          - not_null

      - name: champion_name
        data_tests:
          - not_null

      - name: win
        data_tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: team_position
        data_tests:
          - not_null
          - accepted_values:
              values: ['TOP', 'JUNGLE', 'MIDDLE', 'BOTTOM', 'UTILITY', '']